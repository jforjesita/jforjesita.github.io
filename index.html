<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Jesita Aprimesti</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(-45deg, #e3f2fd, #bbdefb, #90caf9, #e3f2fd);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            animation: fadeSlide 1.2s ease;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            text-align: center;
            border-bottom: 2px solid #64b5f6;
            padding-bottom: 15px;
        }

        h1 {
            margin: 0;
            color: #42a5f5;
            transition: 0.3s;
        }

        h1:hover {
            color: #1e88e5;
            transform: scale(1.05);
        }

        h2 {
            color: #1e88e5;
            margin-top: 30px;
            position: relative;
        }

        h2::after {
            content: "";
            display: block;
            width: 50px;
            height: 3px;
            background: #90caf9;
            margin-top: 5px;
            border-radius: 2px;
        }

        .info p {
            margin: 5px 0;
            transition: 0.3s;
        }

        .info p:hover {
            color: #1565c0;
            transform: translateX(5px);
        }

        .portfolio-item {
            background: #e3f2fd;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .portfolio-item:hover {
            background: #bbdefb;
            transform: scale(1.02);
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #90a4ae;
        }
    </style>
</head>

<body>

<div class="container">

    <header>
        <h1>Jesita Aprimesti</h1>
        <p>Mahasiswa Ilmu Komputer</p>
    </header>

    <section>
        <h2>Data Pribadi</h2>
        <div class="info">
            <p><strong>Nama:</strong> Jesita Aprimesti</p>
        </div>
    </section>

    <section>
        <h2>Portfolio</h2>
        <div class="portfolio-item">
            <p>Website Portfolio Pribadi</p>
        </div>
    </section>

    <footer>
        © 2026 Jesita
    </footer>

</div>

</body>
</html>
